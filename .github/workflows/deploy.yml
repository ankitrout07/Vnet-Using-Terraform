name: Deploy Infrastructure and App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"
        working-directory: ./networking
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: ./networking
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ./networking
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Get Terraform Outputs
        run: |
          echo "RG=$(terraform output -raw resource_group_name)" >> $GITHUB_ENV
          echo "AKS=$(terraform output -raw aks_cluster_name)" >> $GITHUB_ENV
          echo "ACR=$(terraform output -raw acr_login_server)" >> $GITHUB_ENV
        working-directory: ./networking

      - name: AKS Get Credentials
        run: |
          az aks get-credentials --resource-group ${{ env.RG }} --name ${{ env.AKS }} --overwrite-existing

      - name: Login to ACR
        run: |
          ACR_NAME=$(echo ${{ env.ACR }} | cut -d. -f1)
          az acr login --name $ACR_NAME

      - name: Build and Push Docker Image
        run: |
          ACR_NAME=$(echo ${{ env.ACR }} | cut -d. -f1)
          docker build -t ${{ env.ACR }}/fortress-dashboard:latest ./dashboard
          docker push ${{ env.ACR }}/fortress-dashboard:latest

      - name: Update K8s Manifests
        run: |
          sed -i 's|image: .*|image: ${{ env.ACR }}/fortress-dashboard:latest|' k8s/fortress-app.yaml

      - name: Deploy App to AKS
        run: kubectl apply -f k8s/

      - name: Verify Deployment
        run: |
          kubectl get nodes
          kubectl get pods -n default
          kubectl get svc -n default