name: Deploy Infrastructure and App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Explicit mapping to resolve "Not all values are present" error
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
          # Disable the wrapper so terraform exit codes are not swallowed
          # and ::debug:: annotations don't corrupt $GITHUB_ENV
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"
        working-directory: ./networking
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          EXIT_CODE=$?
          set -e
          # 0 = no changes, 1 = error, 2 = changes present
          echo "plan_status=${EXIT_CODE}" >> $GITHUB_ENV
          # Propagate real errors (exit code 1) to fail the step
          if [ $EXIT_CODE -eq 1 ]; then exit 1; fi
        working-directory: ./networking
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Apply
        if: env.plan_status == '2'
        run: terraform apply -auto-approve tfplan
        working-directory: ./networking
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Get Terraform Outputs
        working-directory: ./networking
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          echo "RG=$(terraform output -raw resource_group_name)" >> $GITHUB_ENV
          echo "AKS=$(terraform output -raw aks_cluster_name)" >> $GITHUB_ENV
          echo "ACR=$(terraform output -raw acr_login_server)" >> $GITHUB_ENV

      - name: Build and Push if Needed
        run: |
          ACR_NAME=${{ env.ACR }}
          docker build -t $ACR_NAME/fortress-dashboard:${{ github.sha }} ./dashboard
          az acr login --name $(echo $ACR_NAME | cut -d. -f1)
          docker push $ACR_NAME/fortress-dashboard:${{ github.sha }}

      - name: Deploy to AKS
        run: |
          az aks get-credentials --resource-group ${{ env.RG }} --name ${{ env.AKS }} --overwrite-existing
          sed -i 's|image: .*|image: ${{ env.ACR }}/fortress-dashboard:${{ github.sha }}|' k8s/fortress-app.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/fortress-web --timeout=300s

      - name: Verify Deployment
        run: |
          kubectl get pods -n default
          kubectl get svc -n default
          kubectl get ingress -n default