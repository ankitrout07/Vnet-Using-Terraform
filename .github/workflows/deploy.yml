name: Terraform-Infra-Pipeline

on:
  push:
    branches: [ main ]
    paths: ['networking/**']
  pull_request:
    branches: [ main ]
    paths: ['networking/**']

env:
  # Opt-in to Node 24 to stay ahead of the June 2nd deprecation
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform:
    name: 'Fortress Deployment'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./networking
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      # Only posts comments on Pull Requests
      - name: Update PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('networking/plan.txt', 'utf8');
            const body = `#### Terraform Plan for Fortress-VNet 🛡️
            <details><summary>Show Detailed Plan</summary>
            \`\`\`\n${plan}\n\`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

      # Only runs when code is merged into the main branch
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan