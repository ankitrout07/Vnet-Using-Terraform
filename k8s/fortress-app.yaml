apiVersion: v1
kind: ServiceAccount
metadata:
  name: fortress-dashboard-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fortress-dashboard-role
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "namespaces", "events"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fortress-dashboard-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fortress-dashboard-role
subjects:
- kind: ServiceAccount
  name: fortress-dashboard-sa
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortress-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fortress
  template:
    metadata:
      labels:
        app: fortress
    spec:
      serviceAccountName: fortress-dashboard-sa
      containers:
        - name: fortress-dashboard
          image: fortressvnetdevb0d6a535acru9s3l6.azurecr.io/fortress-dashboard:v3
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: fortress-service
spec:
  selector:
    app: fortress
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
