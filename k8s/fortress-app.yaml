apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortress-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fortress
  template:
    metadata:
      labels:
        app: fortress
    spec:
      containers:
        - name: fortress-dashboard
          image: fortressvnet6aa4e1c7acrt6k0oi.azurecr.io/fortress-dashboard:v2
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: fortress-service
spec:
  selector:
    app: fortress
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
